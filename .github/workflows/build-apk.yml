name: Build APK

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build'
        required: true
        default: 'driver'
        type: choice
        options:
          - driver
          - dispatcher
          - admin
      build_type:
        description: 'Build Type (Debug APK does not require signing keys)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Prebuild Expo App
        run: |
          cd rn-apps/apps/${{ github.event.inputs.app }}
          npx expo prebuild --platform android --no-install

      - name: Build Android APK
        run: |
          cd rn-apps/apps/${{ github.event.inputs.app }}/android
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            ./gradlew assembleDebug
          else
            ./gradlew assembleRelease
          fi

      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app }}-app-debug
          path: rn-apps/apps/${{ github.event.inputs.app }}/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app }}-app-release-unsigned
          path: rn-apps/apps/${{ github.event.inputs.app }}/android/app/build/outputs/apk/release/app-release-unsigned.apk
