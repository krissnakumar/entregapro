services:
  # EntregaPRO NestJS Backend API
  - type: web
    name: entregapro-api
    env: node
    plan: free
    buildCommand: "npm i -g pnpm && pnpm install && pnpm run api:deploy:render"
    startCommand: "pnpm --filter api run start:prod"
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard to your Supabase pooling URL
      - key: DIRECT_URL
        sync: false # Set this in Render Dashboard to your Supabase direct connection URL for Prisma migrations
      - key: REDIS_URL
        sync: false # Preferred Redis connection string for BullMQ on Render
      - key: REDIS_HOST
        sync: false # Set this to your Redis host; the API otherwise falls back to localhost and background queues will fail
      - key: REDIS_PORT
        sync: false # Set this to your Redis port, for example 6379
      - key: JWT_SECRET
        value: "super-secret-key-for-production"
      - key: JWT_REFRESH_SECRET
        value: "another-super-secret-key-for-refresh"
      - key: ALLOWED_ORIGINS
        sync: false # Set this in Render Dashboard to your Vercel frontend URL
