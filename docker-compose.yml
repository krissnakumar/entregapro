version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: entregapro-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: entregapro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d entregapro"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  redis:
    image: redis:alpine
    container_name: entregapro-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: entregapro-api
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/entregapro?schema=public
      JWT_SECRET: ${JWT_SECRET:-super-secret-key}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-another-super-secret-key}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: entregapro-web
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
